<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrabVoice</title>
    <script type="module" src="/src/main.ts" defer></script>
</head>
<body>
    <main class="container">
        <div class="header">
            <h1 id="app-title">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px;">
                    <path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"></path>
                    <path d="M12 11v8"></path>
                    <path d="M8 8a4 4 0 0 1 8 0"></path>
                    <path d="M6 14a2 2 0 0 1-2-2v-2"></path>
                    <path d="M20 14a2 2 0 0 0 2-2v-2"></path>
                </svg>
                CrabVoice
            </h1>
            <p id="app-subtitle">Real-time Native Video Translation</p>
        </div>

        <form id="translate-form" class="card">
            <input id="url-input" type="url" placeholder="Paste video URL (YouTube, VK, Vimeo)..." required />
            <button type="submit" class="btn-primary">▶ Open Video</button>
            <div id="result-msg"></div>
        </form>
        
        <div class="card settings-card">
            <h3>⚙️ Settings</h3>
            
            <div class="setting-group">
                <label>Translate to:</label>
                <select id="set-target-lang">
                    <option value="ru">Русский (Russian)</option>
                    <option value="en">English</option>
                    <option value="kk">Қазақ (Kazakh)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Video Volume Ducking: <span id="vol-val">15%</span></label>
                <input type="range" id="set-volume" min="0" max="100" value="15" />
            </div>

            <div class="setting-group row-checkbox" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <input type="checkbox" id="set-lively" />
                    <label for="set-lively">Use Lively Voices</label>
                </div>
                <button id="btn-login-yandex" style="background:#4CAF50; color:#fff; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:12px;">🔑 Login Yandex</button>
            </div>
            <div id="auth-status" style="font-size:12px; color:#aaa; text-align:right;"></div>

            <div class="setting-group row-checkbox">
                <input type="checkbox" id="set-use-proxy" />
                <label for="set-use-proxy">Use Custom Proxy (HTTP/SOCKS5)</label>
            </div>

            <div class="setting-group proxy-host-group" id="proxy-container">
                <label>Proxy URL:</label>
                <input type="text" id="set-proxy-host" placeholder="socks5://127.0.0.1:1080" />
            </div>
        </div>
        
        <div class="card settings-card">
            <h3>📝 App Logs</h3>
            <div style="display: flex; gap: 10px;">
                <button type="button" id="btn-view-logs" class="btn-primary" style="flex:1; background:#4CAF50;">View Logs</button>
                <button type="button" id="btn-download-logs" class="btn-primary" style="flex:1;">Download (.log)</button>
            </div>
            <textarea id="logs-area" style="display:none; width: 100%; height: 150px; margin-top: 10px; font-family: monospace; font-size: 11px; background: #111; color: #0f0; border: 1px solid #333; border-radius: 6px; padding: 8px; box-sizing: border-box;" readonly></textarea>
        </div>
    </main>
</body>
</html>
