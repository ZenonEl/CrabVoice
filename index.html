<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrabVoice</title>
    <script type="module" src="/src/main.ts" defer></script>
</head>
<body>
    <main class="container">
        <div class="header">
            <div class="header-main">
                <div data-icon="crabLogo"></div>
                <h1 id="app-title">CrabVoice</h1>
                <span class="tier-icon tier-icon-sub" data-icon="tierSubscribers"></span>
                <span class="tier-icon tier-icon-pro" data-icon="tierPremium"></span>
            </div>
            <p id="app-subtitle">Real-time Native Video Translation <span class="pro-badge"><span class="pro-crown" data-icon="tierPremium"></span>PRO</span></p>
        </div>

        <form id="translate-form" class="card">
            <input id="url-input" type="url" placeholder="Paste video URL (YouTube, VK, Vimeo)..." required />
            <button type="submit" class="btn-primary"> <div data-icon="rocket"></div>Open Video</button>
            <div id="result-msg"></div>
        </form>
        
        <div class="card settings-card">
            <h3><div data-icon="gear"></div>Settings</h3>
            
            <div class="setting-group">
                <label>Translate to:</label>
                <select id="set-target-lang">
                    <option value="ru">Русский (Russian)</option>
                    <option value="en">English</option>
                    <option value="kk">Қазақ (Kazakh)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Video Volume Ducking: <span id="vol-val">15%</span></label>
                <input type="range" id="set-volume" min="0" max="100" value="15" />
            </div>

            <div class="setting-group row-checkbox" style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: stretch; gap: 10px;">
                    <input type="checkbox" id="set-lively">
                    <label for="set-lively">Use Lively Voices <div data-icon="audioLines"></div></label>
                </div>
                <button id="btn-login-yandex" class="btn-icon">
                    <div data-icon="key"></div>
                    Login Yandex
                </button>
            </div>
            <div id="auth-status" style="font-size:12px; color:#aaa; text-align:right;"></div>

            <div class="setting-group row-checkbox">
                <input type="checkbox" id="set-use-proxy" />
                <label for="set-use-proxy">Use Custom Proxy (HTTP/SOCKS5) <div data-icon="waypoints"></div></label>
            </div>

            <div class="setting-group proxy-host-group" id="proxy-container">
                <label>Proxy URL:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="set-proxy-host" placeholder="socks5://user:pass@127.0.0.1:1080" style="flex: 1;" />
                    <button type="button" id="btn-ping-proxy" class="btn-primary" style="padding: 8px 12px; min-width: 60px;">Ping</button>
                </div>
                <div id="proxy-ping-result" style="font-size: 12px; margin-top: 5px;"></div>
                
                <div class="info-box">
                    <p><strong><div data-icon="warn"></div> App Restart Required:</strong> Changes to the Proxy URL only take effect after a restart.</p>
                    <p><strong><div data-icon="auth"></div> Authentication:</strong> Supports standard <code>socks5://user:pass@host:port</code> format.</p>
                </div>
            </div>
        </div>
        
        <div class="card settings-card">
            <h3><div data-icon="appLogs"></div>App Logs</h3>
            <div style="display: flex; gap: 10px;">
                <button type="button" id="btn-view-logs" class="btn-primary" style="flex:1; background:#4CAF50;">View Logs</button>
                <button type="button" id="btn-download-logs" class="btn-primary" style="flex:1;">Export / Copy Logs</button>
            </div>
            <textarea id="logs-area" style="display:none; width: 100%; height: 150px; margin-top: 10px; font-family: monospace; font-size: 11px; background: #111; color: #0f0; border: 1px solid #333; border-radius: 6px; padding: 8px; box-sizing: border-box;" readonly></textarea>
        </div>

        <div class="app-footer">
            <p>Crafted with 🦀 by <a href="https://github.com/ZenonEl" target="_blank">ZenonEl</a></p>
            <p class="version-info">CrabVoice v0.3.3 Public Beta</p>
            
            <!-- Socials -->
            <div class="header-socials">
                <a href="https://github.com/ZenonEl/CrabVoice" target="_blank" title="GitHub" data-icon="github">
                <a href="https://mastodon.ml/@ZenonEl" target="_blank" title="Mastodon" data-icon="mastodon"></a>
                <a href="https://github.com/ZenonEl/CrabVoice?tab=GPL-3.0-1-ov-file#readme" title="GPL-3.0-1-ov-file" data-icon="gpl"></a>
        </div>
    </main>
</body>
</html>
